name: Build Push Deploy Backend

on:
  push:
    branches:
      - deploy

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build imagen despacho backend
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/despacho-backend:latest ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO

      - name: Push imagen despacho backend
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/despacho-backend:latest

      - name: Build imagen ventas backend
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ventas-backend:latest ./back-Ventas_SpringBoot/Springboot-API-REST

      - name: Push imagen ventas backend
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/ventas-backend:latest
