name: Build Push Deploy Backend

on:
  push:
    branches:
      - deploy

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build imagen despacho backend
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/despacho-backend:latest ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO

      - name: Push imagen despacho backend
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/despacho-backend:latest

      - name: Build imagen ventas backend
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ventas-backend:latest ./back-Ventas_SpringBoot/Springboot-API-REST

      - name: Push imagen ventas backend
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/ventas-backend:latest

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy backend en EC2 App
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_APP_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy backend desde GitHub Actions" \
            --parameters 'commands=[
              "docker pull ${{ secrets.DOCKERHUB_USERNAME }}/despacho-backend:latest",
              "docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ventas-backend:latest",
              "docker stop despacho-api ventas-api || true",
              "docker rm despacho-api ventas-api || true",
              "docker run -d --name despacho-api -p 8081:8081 -e DB_ENDPOINT=${{ secrets.DB_ENDPOINT }} -e DB_PORT=${{ secrets.DB_PORT }} -e DB_NAME=${{ secrets.DB_NAME }} -e DB_USERNAME=${{ secrets.DB_USERNAME }} -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} ${{ secrets.DOCKERHUB_USERNAME }}/despacho-backend:latest",
              "docker run -d --name ventas-api -p 8080:8080 -e DB_ENDPOINT=${{ secrets.DB_ENDPOINT }} -e DB_PORT=${{ secrets.DB_PORT }} -e DB_NAME=${{ secrets.DB_NAME }} -e DB_USERNAME=${{ secrets.DB_USERNAME }} -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} ${{ secrets.DOCKERHUB_USERNAME }}/ventas-backend:latest",
              "docker ps"
            ]'